<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Invite</title>

    <script>

        function videoReady() {
            document.getElementById("message").innerHTML =
            "Video ready to play";
        }

        window.onbeforeunload = function () {
            return "You have not completed the form. Are you sure you want to leave?";
        };

    </script>

</head>
<body>

    <h2>Community Event Promo Video</h2>

    <video width="500" controls oncanplay="videoReady()">
        <source src="promo.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <p id="message"></p>

    <br><br>

    <form>
        <label>Name:</label>
        <input type="text" placeholder="Enter your name">
    </form>

</body>
</html>

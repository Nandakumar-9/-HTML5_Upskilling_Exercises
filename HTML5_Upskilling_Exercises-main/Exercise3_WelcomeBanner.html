<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome Banner</title>

    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .highlight {
            background-color: yellow;
            font-weight: bold;
            padding: 5px;
        }
    </style>
</head>
<body>

    <!-- Welcome Banner -->
    <div id="welcomeBanner">
        <h1>Welcome to the Community Event Portal</h1>
    </div>

    <p>
        Special Offer:
        <span style="color:red; font-weight:bold;">
            Register today and get 50% discount!
        </span>
    </p>

    <p class="highlight">
        Upcoming Community Events Open for Registration
    </p>

    <p class="highlight">
        Limited Seats Available
    </p>

</body>
</html>

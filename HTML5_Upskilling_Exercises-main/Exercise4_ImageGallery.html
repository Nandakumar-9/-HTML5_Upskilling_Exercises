<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Community Event Gallery</title>

```
<style>
    .eventImage {
        border: 3px solid black;
        width: 200px;
        height: 150px;
    }

    table {
        margin: auto;
        border-spacing: 15px;
    }

    caption {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 15px;
    }

    td {
        text-align: center;
    }
</style>
```

</head>
<body>

```
<!-- Community Event Gallery -->
<table>
    <caption>Community Event Gallery</caption>

    <tr>
        <td>
            <img src="images/event1.avif"
                 alt="Music Event"
                 title="Music Event"
                 class="eventImage">
            <p><b>Music Festival</b></p>
        </td>

        <td>
            <img src="images/event2.avif"
                 alt="Sports Event"

        <td>
            <img src="images/event3.avif"
                 alt="Food Event"

                 class="eventImage">

    </tr>

    <tr>
        <td>
            <img src="images/event4.avif"
                 alt="Cultural Event"

            <p><b>Cultural Fest</b></p>

        <td>
            <img src="images/event5.avif"
                 alt="Art Event"

</table>

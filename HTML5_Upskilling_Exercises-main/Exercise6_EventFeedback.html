<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Feedback</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        img {
            width: 200px;
            cursor: pointer;
        }

        #fee, #charCount, #phoneMsg {
            color: blue;
            font-weight: bold;
        }
    </style>

    <script>

        function validatePhone() {
            let phone = document.getElementById("phone").value;

            if(phone.length != 10) {
                document.getElementById("phoneMsg").innerHTML =
                "Phone number must contain 10 digits";
            }
            else {
                document.getElementById("phoneMsg").innerHTML =
                "Valid Phone Number";
            }
        }

        function showFee() {
            let event = document.getElementById("eventType").value;
            let fee = "";

            if(event == "Music Festival")
                fee = "Fee: ₹500";
            else if(event == "Sports Meet")
                fee = "Fee: ₹300";
            else if(event == "Food Carnival")
                fee = "Fee: ₹200";

            document.getElementById("fee").innerHTML = fee;
        }

        function confirmSubmission() {
            alert("Feedback Submitted Successfully!");
        }

        function enlargeImage(img) {
            img.style.width = "400px";
        }

        function countCharacters() {
            let count =
            document.getElementById("feedback").value.length;

            document.getElementById("charCount").innerHTML =
            "Characters: " + count;
        }

    </script>

</head>
<body>

    <h2>Event Feedback Form</h2>

    <label>Phone Number:</label><br>
    <input type="text" id="phone" onblur="validatePhone()">
    <p id="phoneMsg"></p>

    <br>

    <label>Select Event:</label><br>
    <select id="eventType" onchange="showFee()">
        <option>Select Event</option>
        <option>Music Festival</option>
        <option>Sports Meet</option>
        <option>Food Carnival</option>
    </select>

    <p id="fee"></p>

    <br>

    <img src="https://via.placeholder.com/200x150"
         ondblclick="enlargeImage(this)"
         alt="Event Image">

    <p>Double Click the image to enlarge.</p>

    <br>

    <label>Feedback:</label><br>
    <textarea id="feedback"
              rows="5"
              cols="40"
              onkeyup="countCharacters()"></textarea>

    <p id="charCount">Characters: 0</p>

    <br>

    <button onclick="confirmSubmission()">
        Submit Feedback
    </button>

</body>
</html>
